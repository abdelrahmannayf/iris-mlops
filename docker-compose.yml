version: '3.8'

services:
  # MLflow Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: mlflow-server
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlflow
    networks:
      - iris-network

  # AI Trainer
  trainer:
    build: .
    container_name: iris-trainer
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - N_ESTIMATORS=100
      - MAX_DEPTH=3
    depends_on:
      - mlflow
    networks:
      - iris-network
    restart: on-failure

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - iris-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - iris-network

networks:
  iris-network:
    driver: bridge

volumes:
  mlflow-data:
  grafana-data:
